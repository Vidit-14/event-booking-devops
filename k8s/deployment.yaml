apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-booking-app
  labels:
    app: event-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-booking
  template:
    metadata:
      labels:
        app: event-booking
    spec:
      containers:
      - name: event-booking-container
        # Must match the image name you pushed to Docker Hub
        image: vidit1406/event-booking:latest
        # Forces Kubernetes to always download the newest version from the cloud
        imagePullPolicy: Always
        ports:
        - containerPort: 8501