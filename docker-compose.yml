version: '3.8'

services:
  event-booking:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-booking-app
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    networks:
      - event-booking-network

networks:
  event-booking-network:
    driver: bridge
